; DefaultEngine.ini — Cabin / UE 5.3
; Optimised for Apple Silicon (M4) — Lumen + Nanite + TSR at 60-120fps.

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Maps/CabinBoardingMap
GlobalDefaultGameMode=/Game/Blueprints/BP_CabinGameMode.BP_CabinGameMode_C

; ---------------------------------------------------------------------------
; RENDERING — Lumen Global Illumination
; ---------------------------------------------------------------------------
[/Script/Engine.RendererSettings]
; Nanite — high-poly cabin meshes at no triangle budget cost.
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0

; Lumen — dynamic GI + reflections for accurate cabin bounce lighting.
r.Lumen.Reflections.Allow=1
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1

; Temporal Super Resolution — clean AA, stable IFE text.
r.AntiAliasingMethod=4
r.TSR.History.ScreenPercentage=200
r.TSR.ShadingRejection.Flickering=1

; Render at full native res — M4 can handle it.
r.ScreenPercentage=100

; Virtual Shadow Maps — accurate soft shadows for overhead bin, console.
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.SMRT.Enable=1

; Translucency — for window glare, duvet, amenity kit materials.
r.SeparateTranslucency=1
r.TranslucencyLightingVolumeDim=64

; Motion blur — subtle, tuned for turbulence shake curves.
r.MotionBlur.Amount=0.35
r.MotionBlur.Max=8
r.MotionBlurQuality=3

; Depth of field — shallow DOF for immersive first-person feel.
r.DepthOfFieldQuality=2

; Bloom — IFE screen glow, seatbelt sign.
r.BloomQuality=5
r.Bloom.CrossBlend=0.05

; Eye adaptation — smooth transitions boarding (bright) → cruise (dim).
r.EyeAdaptation.MethodOverride=2
r.EyeAdaptation.SpeedUp=2.0
r.EyeAdaptation.SpeedDown=1.2

; Post process quality.
r.PostProcessAAQuality=6
r.AmbientOcclusionLevels=2
r.AmbientOcclusionRadiusScale=1.2

; ---------------------------------------------------------------------------
; RENDERING — iOS / Metal specific
; ---------------------------------------------------------------------------
[/Script/IOSRuntimeSettings.IOSRuntimeSettings]
; Metal feature set tier — GPU Family 9 covers M4.
MobileHDR=True
MetalMobileVersion=Metal_3_1
PreferredFramerate=120
bSupportsMetalMRT=True
bGenerateXCArchive=True

; Low-power fallback mode — triggered by CabinBridge_SetLowPower(1).
; Disables Lumen, uses baked lighting instead.
[CabinLowPowerMode]
r.Lumen.Reflections.Allow=0
r.DynamicGlobalIlluminationMethod=0
r.ReflectionMethod=0
r.Shadow.Virtual.Enable=0
r.MotionBlurQuality=0
r.BloomQuality=2
r.ScreenPercentage=75

; ---------------------------------------------------------------------------
; AUDIO — Convolution reverb for cabin spatialization
; ---------------------------------------------------------------------------
[/Script/AudioMixer.AudioMixerSettings]
bEnableAudioMixer=True
NumSourceWorkers=4
SourceDataOverridePluginName=""
SpatializationPlugin=OculusAudio
; Fall back to built-in HRTF if Oculus not available.
bAllowPlayWhenSilent=True

[/Script/Engine.AudioSettings]
DefaultSoundClassName=/Game/Audio/SC_CabinDefault.SC_CabinDefault
QualityLevels=(
    (DisplayName="High",  MaxChannels=128, ResampleQuality=3),
    (DisplayName="Medium",MaxChannels=64,  ResampleQuality=2),
    (DisplayName="Low",   MaxChannels=32,  ResampleQuality=1)
)
DefaultQualityLevel=0

; ---------------------------------------------------------------------------
; FRAME PACING — ProMotion 120Hz on iPad
; ---------------------------------------------------------------------------
[/Script/Engine.Engine]
bSmoothFrameRate=True
SmoothedFrameRateRange=(LowerBound=(Type=Inclusive,Value=60.000000),UpperBound=(Type=Exclusive,Value=121.000000))
MinDesiredFrameRate=60.000000
bUseFixedFrameRate=False

; ---------------------------------------------------------------------------
; STREAMING
; ---------------------------------------------------------------------------
[/Script/Engine.StreamingSettings]
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1
s.LevelStreamingActorsUpdateTimeLimit=2.5

[TextureStreaming]
bEnableTextureStreaming=True
PoolSize=1024

; ---------------------------------------------------------------------------
; GC / MEMORY
; ---------------------------------------------------------------------------
[/Script/Engine.GarbageCollectionSettings]
gc.MaxObjectsInEditor=12582912
gc.TimeBetweenPurgingPendingKillObjects=60

; ---------------------------------------------------------------------------
; INPUT — Gyroscope + touch mapped to Cabin actions
; ---------------------------------------------------------------------------
[/Script/Engine.InputSettings]
bUseMouseForTouch=False
bEnableMotionControls=True
DefaultViewportMouseCaptureMode=NoCapture

; ---------------------------------------------------------------------------
; NETWORK — Cabin is offline-only
; ---------------------------------------------------------------------------
[/Script/Engine.NetworkSettings]
bVerifyPeer=False
bCanReuseAddresses=True
NetDriverDefinitions=
