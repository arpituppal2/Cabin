; DefaultEngine.ini — CabinEngine
; Lumen global illumination + reflections, Nanite, Temporal Super Resolution,
; Virtual Shadow Maps, and audio pipeline pre-configured for 60fps on Apple M4.
;
; All CVars that have "// DEFAULT" comments are UE5.3 defaults included
; here explicitly so the intent is documented and future-proof.

[/Script/EngineSettings.GameMapsSettings]
GlobalDefaultGameMode=/Script/CabinEngine.CabinGameMode
GlobalDefaultServerGameMode=/Script/CabinEngine.CabinGameMode
GameDefaultMap=/Game/Maps/CabinMain
ServerDefaultMap=/Game/Maps/CabinMain

; ──────────────────────────────────────────────────
; RENDERING — Core pipeline
; ──────────────────────────────────────────────────
[/Script/Engine.RendererSettings]
; Lumen Global Illumination
r.Lumen.Enabled=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.HardwareRayTracing=0          ; Software Lumen only — Metal does not expose DXR
r.Lumen.TracingMode=1                  ; Surface cache (faster than full ray trace, same quality for interiors)
r.Lumen.ScreenProbeGather.FullResolutionJitterWidth=1
r.Lumen.Reflections.DownsampleFactor=1 ; Full-res reflections (cabin OLED glare)

; Nanite
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0          ; Highest geometric detail
r.Nanite.PrimaryRaster.PixelProgrammableRasterization=1

; Temporal Super Resolution (TSR) — replaces TAA
r.TemporalAA.Upscaler=TSR
r.TSR.History.ScreenPercentage=200     ; 2x history accumulation — stable IFE text
r.TSR.ShadingRejection.Flickering.Period=3
r.TSR.Velocity.WeightClampingSampleCount=4

; Screen percentage — render at 80%, TSR upscales to native
r.ScreenPercentage=80

; Virtual Shadow Maps
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.MaxPhysicalPages=2048 ; Generous page pool for cabin interior shadows
r.Shadow.Virtual.Cache.StaticSeparate=1

; Anti-aliasing
r.AntiAliasingMethod=4                 ; TSR

; Target frame rate: 60fps hard cap
t.MaxFPS=60

; Motion blur — minimal; turbulence handled by camera shake curve
r.MotionBlurQuality=1
r.MotionBlur.Max=0.03

; Ambient Occlusion (Lumen provides SSGI but GTAO adds contact shadow crispness)
r.AOType=1                             ; Ground Truth AO
r.GTAO.Intensity=0.7

; Depth of field — off by default; optional cinematic mode
r.DepthOfFieldQuality=0

; Bloom — subtle for IFE glow
r.BloomQuality=3
r.Bloom.CrossBlurRadius=0.0

; Auto-exposure — disabled; lighting scripted per flight phase
r.EyeAdaptationQuality=0
r.EyeAdaptation.IgnoreMaterials=1

; Reflections
r.ReflectionCaptureResolution=256
r.ReflectionEnvironmentLightmapMixBasedOnRoughness=1

; Post process
r.Tonemapper.Quality=5
r.ToneMapperFilm=1
r.HDR.Display.OutputDevice=3           ; Rec.2020 / PQ for ProMotion XDR
r.HDR.Display.ColorGamut=4

; ──────────────────────────────────────────────────
; RENDERING — Mobile / iOS overrides
; Applied when the game is cooked for iOS (iphoneos SDK).
; These override the above when the low-power fallback fires.
; ──────────────────────────────────────────────────
[/Script/IOSRuntimeSettings.IOSRuntimeSettings]
iPhoneVersion=NO
iPadVersion=YES
BuildForArmV7=NO
BuildForArm64=YES
MRTFastPathEmulation=YES
EnableMetal=YES
EnableRemoteNotificationsSupport=NO
EnableCloudKitSupport=NO
AllowHTTP=NO

; Metal-specific rendering
[/Script/Engine.RendererSettings IOS]
r.Metal.UseFramebufferFetch=1
r.Metal.MaxShaderVersion=6
r.Mobile.DisableVertexFog=1
r.MobileContentScaleFactor=2           ; Retina
r.MobileMSAA=2                         ; 2x MSAA (low-power fallback anti-alias)

; Low-power fallback mode (battery saver)
; Triggered by CabinSessionManager when UIDevice.current.batteryLevel < 0.2
; AND the device is not charging. All values below override Lumen/TSR at runtime
; via the CVar system (SessionManager calls IConsoleManager::Get().FindConsoleVariable).
[CabinLowPowerFallback]
r.Lumen.Enabled=0
r.Lumen.DiffuseIndirect.Allow=0
r.Lumen.Reflections.Allow=0
r.TemporalAA.Upscaler=TAA              ; Revert to TAA for lower GPU overhead
r.ScreenPercentage=67                  ; ~0.67x native — saves ~30% GPU
r.Shadow.Virtual.Enable=0
r.Shadow.DistanceScale=0.5
t.MaxFPS=30

; ──────────────────────────────────────────────────
; AUDIO — Metasound + Convolution Reverb
; ──────────────────────────────────────────────────
[/Script/AudioMixer.AudioMixerSettings]
audio.OutputFormat=Float32
audio.NumBuffers=3
audio.CallbackBufferFrameSize=512
audio.MaxSources=32
audio.MaxConcurrentReverbs=4
audio.ReverbPlugin=Unreal              ; Native convolution reverb
audio.SpatializationPlugin=Unreal

[/Script/Engine.AudioSettings]
DefaultReverbSendLevel=0.35
MaxWaveInstances=96
GlobalMinPitch=0.4
GlobalMaxPitch=2.0
bDisableMasterEQ=False
bAllow3DAudio=True
DefaultSoundClassName=/Game/Audio/SoundClasses/SC_Master.SC_Master

; ──────────────────────────────────────────────────
; STREAMING & MEMORY
; ──────────────────────────────────────────────────
[/Script/Engine.StreamingSettings]
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1
r.Streaming.FullyLoadUsedTextures=1
r.Streaming.MaxTempMemoryAllowed=128   ; MB — generous for 4K video plate swap
r.Streaming.PoolSize=1024              ; MB texture pool; M4 has unified memory headroom

; ──────────────────────────────────────────────────
; GARBAGE COLLECTION
; ──────────────────────────────────────────────────
[/Script/CoreUObject.GarbageCollectionSettings]
gc.TimeBetweenPurgingPendingKillObjects=60.0  ; GC every 60s — reduces stutter during cruise
gc.MultithreadedDestructionEnabled=1
gc.MaxObjectsNotConsideredByGC=1048576

; ──────────────────────────────────────────────────
; PHYSICS (minimal — no rigid body sim in cabin)
; ──────────────────────────────────────────────────
[/Script/Engine.PhysicsSettings]
bSuppressFaceRemapTable=True
MaxPhysicsDeltaTime=0.033
bSubstepping=False                     ; No physics substepping needed

; ──────────────────────────────────────────────────
; ENGINE GENERAL
; ──────────────────────────────────────────────────
[/Script/Engine.Engine]
bSmoothFrameRate=True
MinSmoothedFrameRate=55
MaxSmoothedFrameRate=60
bUseFixedFrameRate=False
FixedFrameRate=60.000000
bCanBlueprintsTickByDefault=False      ; Explicit tick groups only — perf hygiene

[URL]
Port=7777
