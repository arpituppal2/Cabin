; CabinEngine DefaultEngine.ini
; Tuned for M4 Max — Lumen + Nanite + TSR enabled.
; Low-power mode overrides these at runtime from CabinSessionManager.

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Maps/CabinMap
GlobalDefaultGameMode=/Script/CabinEngine.CabinGameMode

[/Script/Engine.RendererSettings]
; Lumen global illumination
r.Lumen.Reflections.Enable=1
r.Lumen.GlobalIllumination.Enable=1
r.Lumen.TranslucencyReflections.FrontLayer.Enable=1
; Nanite
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0
; Temporal Super Resolution
r.AntiAliasingMethod=4
r.TSR.History.ScreenPercentage=200
r.ScreenPercentage=100
; Motion blur
r.MotionBlur.Amount=0.3
r.MotionBlur.Max=2
; IFE emissive bloom — subtle, premium
r.Bloom.Enable=1
r.Bloom.Intensity=0.6
r.Bloom.Threshold=-1
; Shadow quality
r.Shadow.CSM.MaxCascades=4
r.ShadowQuality=5
; Depth of field
r.DepthOfFieldQuality=2

[/Script/Engine.AudioSettings]
DefaultSoundClass=/Game/Audio/SoundClasses/CabinDefault.CabinDefault
DefaultReverbPreset=/Game/Audio/Reverb/CabinSeatReverb.CabinSeatReverb
DefaultBaseSoundMix=/Game/Audio/Mixes/CabinMasterMix.CabinMasterMix

[/Script/IOSRuntimeSettings.IOSRuntimeSettings]
MinimumiOSVersion=17_0
bSupportsPortraitOrientation=False
bSupportsUpsideDownOrientation=False
bSupportsLandscapeLeftOrientation=True
bSupportsLandscapeRightOrientation=True
bEnableBackgroundAudio=True
AudioSampleRate=48000
bUseRemoteNotifications=False
bEnableGameCenterSupport=False
bEnableInAppPurchase=False
bFileSharingEnabled=False

[/Script/MacTargetPlatform.MacTargetSettings]
MetalLanguageVersion=Metal_2_4

[/Script/Engine.Engine]
bSmoothFrameRate=True
MinDesiredFrameRate=60.0
MaxFPS=120.0

[/Script/UnrealEd.CookerSettings]
bCompileBlueprintsInDevelopment=False

[/Script/Engine.GarbageCollectionSettings]
gc.MaxObjectsNotConsideredByGC=1048576
gc.SizeOfPermanentObjectPool=0

[ConsoleVariables]
; Ensure stable 60fps IFE texture pump
r.RHIThread.Enable=1
r.GPUCrashDebugging=0
; Niagara GPU particles for air vent and dust
fx.Niagara.MaxGPUParticlesSpawnPerFrame=8192
