; DefaultEngine.ini — CabinEngine
; UE 5.7.4 — macOS 26 — Metal 3 (Apple M4)
; Lumen GI + Reflections, Nanite, TSR, VSM, Metasound
; Target: 60 fps on iPad Pro M4 (on charger)

[/Script/EngineSettings.GameMapsSettings]
GlobalDefaultGameMode=/Script/CabinEngine.CabinGameMode
GlobalDefaultServerGameMode=/Script/CabinEngine.CabinGameMode
GameDefaultMap=/Game/Maps/CabinMain
ServerDefaultMap=/Game/Maps/CabinMain

; ─────────────────────────────────────────────────────
; RENDERING — Core pipeline
; ─────────────────────────────────────────────────────
[/Script/Engine.RendererSettings]

; Lumen Global Illumination
r.Lumen.Enabled=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
; UE 5.7: Metal 3 on M2+ supports Hardware Ray Tracing via MetalRT.
; M4 qualifies. Enable for best cabin OLED glare and window reflections.
r.Lumen.HardwareRayTracing=1
r.Lumen.HardwareRayTracing.MaxIterations=8
r.Lumen.Reflections.HardwareRayTracing=1
r.Lumen.TracingMode=1
r.Lumen.ScreenProbeGather.FullResolutionJitterWidth=1
r.Lumen.Reflections.DownsampleFactor=1

; Nanite
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.PrimaryRaster.PixelProgrammableRasterization=1
; UE 5.7: Nanite Tessellation (displacement) — off by default, enable per-asset
r.Nanite.Tessellation=0

; Temporal Super Resolution (TSR)
r.TemporalAA.Upscaler=TSR
r.TSR.History.ScreenPercentage=200
r.TSR.ShadingRejection.Flickering.Period=3
r.TSR.Velocity.WeightClampingSampleCount=4
; UE 5.7: TSR Gen 2 — improved sub-pixel stability, better for IFE digits
r.TSR.AsyncCompute=1

; Render at 80%, TSR upscales to native resolution
r.ScreenPercentage=80

; Virtual Shadow Maps
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.MaxPhysicalPages=2048
r.Shadow.Virtual.Cache.StaticSeparate=1
; UE 5.7: VSM one-pass projection (reduces GPU stalls on Metal)
r.Shadow.Virtual.OnePassProjection=1

; Anti-aliasing
r.AntiAliasingMethod=4

; Frame rate
t.MaxFPS=60

; Motion blur — subtle; turbulence handled by camera shake
r.MotionBlurQuality=1
r.MotionBlur.Max=0.03

; Ambient Occlusion
r.AOType=1
r.GTAO.Intensity=0.7

; Depth of Field — off by default
r.DepthOfFieldQuality=0

; Bloom
r.BloomQuality=3
r.Bloom.CrossBlurRadius=0.0

; Auto-exposure disabled — lighting scripted per flight phase
r.EyeAdaptationQuality=0
r.EyeAdaptation.IgnoreMaterials=1

; Reflections
r.ReflectionCaptureResolution=256
r.ReflectionEnvironmentLightmapMixBasedOnRoughness=1

; Post process
r.Tonemapper.Quality=5
r.ToneMapperFilm=1
; Rec.2020 / PQ for ProMotion XDR on iPad Pro M4
r.HDR.Display.OutputDevice=3
r.HDR.Display.ColorGamut=4

; UE 5.7: Substrate material framework (replaces legacy shading models)
; Cabin materials (marble, walnut, OLED bevel) should use Substrate.
r.Substrate=1
r.Substrate.Debug.PrincipledBSDF=0

; ─────────────────────────────────────────────────────
; RENDERING — iOS / Metal overrides
; ─────────────────────────────────────────────────────
[/Script/IOSRuntimeSettings.IOSRuntimeSettings]
iPhoneVersion=NO
iPadVersion=YES
BuildForArmV7=NO
BuildForArm64=YES
MRTFastPathEmulation=YES
EnableMetal=YES
EnableRemoteNotificationsSupport=NO
EnableCloudKitSupport=NO
AllowHTTP=NO
; macOS 26 SDK: target iPadOS 26
MinimumiOSVersion=26_0

[/Script/Engine.RendererSettings IOS]
r.Metal.UseFramebufferFetch=1
; UE 5.7: Metal shader version 3.1 (M4 supports full MSL 3.1)
r.Metal.MaxShaderVersion=7
r.Mobile.DisableVertexFog=1
r.MobileContentScaleFactor=2
r.MobileMSAA=2

; ─────────────────────────────────────────────────────
; LOW-POWER FALLBACK
; Applied at runtime by CabinSessionManager when
; battery < 20% AND not charging.
; ─────────────────────────────────────────────────────
[CabinLowPowerFallback]
r.Lumen.Enabled=0
r.Lumen.HardwareRayTracing=0
r.Lumen.DiffuseIndirect.Allow=0
r.Lumen.Reflections.Allow=0
r.TemporalAA.Upscaler=TAA
r.ScreenPercentage=67
r.Shadow.Virtual.Enable=0
r.Shadow.DistanceScale=0.5
t.MaxFPS=30
r.Substrate=0

; ─────────────────────────────────────────────────────
; AUDIO — Metasound + Convolution Reverb
; ─────────────────────────────────────────────────────
[/Script/AudioMixer.AudioMixerSettings]
audio.OutputFormat=Float32
audio.NumBuffers=3
audio.CallbackBufferFrameSize=512
audio.MaxSources=32
audio.MaxConcurrentReverbs=4
audio.ReverbPlugin=Unreal
audio.SpatializationPlugin=Unreal

[/Script/Engine.AudioSettings]
DefaultReverbSendLevel=0.35
MaxWaveInstances=96
GlobalMinPitch=0.4
GlobalMaxPitch=2.0
bDisableMasterEQ=False
bAllow3DAudio=True
DefaultSoundClassName=/Game/Audio/SoundClasses/SC_Master.SC_Master

; ─────────────────────────────────────────────────────
; STREAMING & MEMORY
; ─────────────────────────────────────────────────────
[/Script/Engine.StreamingSettings]
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1
r.Streaming.FullyLoadUsedTextures=1
r.Streaming.MaxTempMemoryAllowed=128
r.Streaming.PoolSize=1024

; ─────────────────────────────────────────────────────
; GARBAGE COLLECTION
; ─────────────────────────────────────────────────────
[/Script/CoreUObject.GarbageCollectionSettings]
gc.TimeBetweenPurgingPendingKillObjects=60.0
gc.MultithreadedDestructionEnabled=1
gc.MaxObjectsNotConsideredByGC=1048576

; ─────────────────────────────────────────────────────
; PHYSICS
; ─────────────────────────────────────────────────────
[/Script/Engine.PhysicsSettings]
bSuppressFaceRemapTable=True
MaxPhysicsDeltaTime=0.033
bSubstepping=False

; ─────────────────────────────────────────────────────
; ENGINE GENERAL
; ─────────────────────────────────────────────────────
[/Script/Engine.Engine]
bSmoothFrameRate=True
MinSmoothedFrameRate=55
MaxSmoothedFrameRate=60
bUseFixedFrameRate=False
FixedFrameRate=60.000000
bCanBlueprintsTickByDefault=False

[URL]
Port=7777
