; DefaultInput.ini — Cabin
; Maps touch / gyro input to named actions consumed by CabinPlayerController.

[/Script/Engine.InputSettings]

; ---------------------------------------------------------------------------
; AXIS MAPPINGS — continuous values
; ---------------------------------------------------------------------------

; Gyroscope yaw (Z-axis rotation rate, radians/s).
; The Swift bridge forwards pre-multiplied deltas, so Scale=1 here.
+AxisMappings=(AxisName="CabinLookYaw",  Key=Gamepad_LeftX,           Scale=1.000000)
+AxisMappings=(AxisName="CabinLookYaw",  Key=MotionController_Left_Thumbstick_X, Scale=1.0)

; Gyroscope pitch (X-axis rotation rate).
+AxisMappings=(AxisName="CabinLookPitch", Key=Gamepad_LeftY,           Scale=-1.000000)
+AxisMappings=(AxisName="CabinLookPitch", Key=MotionController_Left_Thumbstick_Y, Scale=-1.0)

; Touch drag look — handled directly by CabinBridge_SendGyro in Swift,
; but mapped here for Mac fallback via mouse.
+AxisMappings=(AxisName="CabinLookYaw",  Key=MouseX,                  Scale=0.30)
+AxisMappings=(AxisName="CabinLookPitch", Key=MouseY,                  Scale=-0.30)

; ---------------------------------------------------------------------------
; ACTION MAPPINGS — discrete events
; ---------------------------------------------------------------------------

; Primary tap — IFE interaction, seat buttons.
; On iOS: fired by CabinBridge_SendTap. On Mac: left mouse.
+ActionMappings=(ActionName="CabinTap",           Key=LeftMouseButton,       bShift=False, bCtrl=False, bAlt=False, bCmd=False)
+ActionMappings=(ActionName="CabinTap",           Key=Touch1,                bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; Tray table toggle (two-finger swipe down in GestureRouter).
+ActionMappings=(ActionName="CabinTrayToggle",    Key=T,                     bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; Break walk (two-finger swipe up).
+ActionMappings=(ActionName="CabinBreakWalk",     Key=B,                     bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; Seat settings overlay (long press).
+ActionMappings=(ActionName="CabinSeatSettings",  Key=S,                     bShift=True,  bCtrl=False, bAlt=False, bCmd=False)

; Recline HUD (pinch-in).
+ActionMappings=(ActionName="CabinReclineHUD",    Key=R,                     bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; IFE mode cycle — tap the IFE screen area.
+ActionMappings=(ActionName="CabinIFECycle",      Key=I,                     bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; Emergency kill — end session immediately (for debugging).
+ActionMappings=(ActionName="CabinEndSession",    Key=Escape,                bShift=False, bCtrl=False, bAlt=False, bCmd=False)

; ---------------------------------------------------------------------------
; TOUCH interface — pass-through to Blueprint.
; ---------------------------------------------------------------------------
bAlwaysShowTouchInterface=False
bShowConsoleOnFourFingerTap=False
bUseMouseForTouch=False
bEnableMotionControls=True
bEnableFOVScaling=False
FOVScale=0.011110

; ---------------------------------------------------------------------------
; CONSOLE / DEBUG — disabled in shipping builds.
; ---------------------------------------------------------------------------
ConsoleKey=Tilde
bDisableMouseButtons=False
